<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Helferplan Festspiele</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
    #schichtplan { background: white; padding: 15px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Helferplan Festspiele vom Nordring</h1>
  <div id="schichtplan">Lade Daten... bitte warten.</div>

  <script>
    const BASEROW_TOKEN = "SvWXJIjz6eyKd1Z7REyRpCtnuCqJYPrQ";
    const ID_EINTRAEGE = 991494;
    const ID_KONFIG = 991493;

    async function api(method, url, body = null) {
      const opt = { 
        method, 
        headers: { 'Authorization': 'Token ' + BASEROW_TOKEN, 'Content-Type': 'application/json' } 
      };
      if (body) opt.body = JSON.stringify(body);
      const res = await fetch(url, opt);
      if (!res.ok) throw new Error('API Fehler: ' + res.status);
      return res.status === 204 ? {} : res.json();
    }

    async function ladeAlles() {
      try {
        console.log("Starte Datenabruf...");
        
        // 1. Konfig laden
        const konfRes = await api('GET', 'https://api.baserow.io/api/database/rows/table/' + ID_KONFIG + '/?user_field_names=true');
        console.log("Konfig geladen:", konfRes.results.length, "Einträge");
        
        // 2. Einträge laden (mit einfacher Schleife)
        let alleZeilen = [];
        let url = 'https://api.baserow.io/api/database/rows/table/' + ID_EINTRAEGE + '/?user_field_names=true&size=100';
        
        while (url) {
          const res = await api('GET', url);
          alleZeilen = alleZeilen.concat(res.results);
          url = res.next;
          console.log("Seite geladen, bisher gesamt:", alleZeilen.length);
        }

        document.getElementById('schichtplan').innerHTML = "Daten geladen (" + alleZeilen.length + " Einträge). Zeichne Plan...";
        // Hier geht es mit deiner Logik weiter...
        // (Ich habe den Rest hier gekürzt zur Übersicht, füge deine `zeigeTag` Logik hier wieder ein)
        
      } catch(e) {
        document.getElementById('schichtplan').innerHTML = "FEHLER: " + e.message;
        console.error(e);
      }
    }

    ladeAlles();
  </script>
</body>
</html>
