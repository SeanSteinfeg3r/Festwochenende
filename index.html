<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helferplan Festspiele vom Nordring Pt. 2</title>
  <style>
    html, body { height:100%; margin:0; padding:0; }
    body { font-family: Arial, sans-serif; padding: 16px; margin:0; background: #f9f9f9; min-height:100vh;}
    h1, h2 { text-align: center; }
    .tage-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    button, .tage-buttons button { padding: 12px 14px; background: #007bff; color: white; border: none; border-radius: 7px; cursor: pointer; font-size:1.07em; }
    button:active, .tage-buttons button:active { background: #2741b5; }
    button:hover, .tage-buttons button:hover { background: #0056b3; }
    .btn-purple { background: #6f42c1; color: #fff !important; }
    .btn-purple:hover, .btn-purple:active { background: #5a349c; }
    #schichtplan { margin-bottom:18px;}
    table { width: 100%; border-collapse: collapse; background: white; margin-top: 8px; min-width:520px;}
    th, td { border: 1px solid #ccc; padding: 8px 5px; text-align: center; vertical-align: top; }
    th { background-color: #eee; }
    input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size:1em; width:100%; box-sizing:border-box; }
    .helfer-list { list-style: none; margin: 0; padding: 0; text-align: left; }
    .helfer-list li { padding: 2px 4px; }
    
    #verantwortlicheBox { display:none; position:fixed; z-index:999; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.23);}
    #verantwortlicheInhalt { background:#fff; max-width:95vw; margin:8vw auto 0 auto; padding:18px 5vw 14px 5vw; border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,0.21); border:3px solid #22bb33; position:relative; }
    #verantwortlicheInhalt h2 { color:#22bb33; margin-top:0; font-size:1.4em;}
    #verantwortlicheInhalt table { width:100%; background:#f6fff8; font-size:1em; min-width:330px;}
    #verantwortlicheInhalt th { background:#1b8f28; color:#fff; font-size:1em; }
    #verantwortlicheInhalt td, #verantwortlicheInhalt th { border:1px solid #8cb07b; padding:8px 10px; white-space: nowrap; }
    #verantwortlicheClose { position:absolute; right:14px; top:14px; background:#c4186a; color:#fff; border:none; font-size:1.2em; border-radius:50%; width:30px; height:30px; cursor:pointer; }
    
    .input-gruppe { display: flex; align-items: stretch; margin-top: 5px; }
    .input-gruppe input { flex-grow: 1; border-right: none; border-radius: 5px 0 0 5px; min-width: 50px; padding: 8px;}
    .input-gruppe button { flex-shrink: 0; border-radius: 0 5px 5px 0; font-size: 1.1em; padding: 8px 12px;}

    .schicht-voll { margin-top: 10px; padding: 8px; font-weight: bold; color: #28a745; background-color: #eaf6ec; border: 1px solid #a3d9b1; border-radius: 5px; font-size: 0.95em; }
    #schichtplan, .scroll-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    
    @media (max-width: 750px) {
      h1 { font-size:1.4em;}
      .tage-buttons button, button { font-size:1em; padding:10px 7px; min-width:95px;}
    }
  </style>
</head>
<body>
  <h1>Helferplan Festspiele vom Nordring Pt. 2</h1>
  
  <div class="tage-buttons">
    <button onclick="zeigeTag('Aufbau')">Aufbau 11.06.</button>
    <button onclick="zeigeTag('Freitag')">Fr 12.06.</button>
    <button onclick="zeigeTag('Samstag')">Sa 13.06.</button>
    <button onclick="zeigeTag('Sonntag')">So 14.06.</button>
    <button onclick="zeigeTag('Abbau')">Abbau 15.06.</button>
    <button class="btn-purple" onclick="zeigeVerantwortliche()">Verantwortliche</button>
  </div>

  <div id="schichtplan"></div>

  <div id="verantwortlicheBox" onclick="if(event.target===this)verantwortlicheSchliessen()">
    <div id="verantwortlicheInhalt">
      <button id="verantwortlicheClose" onclick="verantwortlicheSchliessen()">&times;</button>
      <h2>Schichtverantwortliche</h2>
      <div class="scroll-container">
        <table>
          <thead><tr><th>Bereich</th><th>Name</th><th>Telefon</th></tr></thead>
          <tbody>
            <tr><td>Ausschank</td><td>Nico Fischer</td><td>0163-9079261</td></tr>
            <tr><td>Küche</td><td>Iris Dörfler / Martin Freiberger</td><td>0170-4071272</td></tr>
            <tr><td>Technik</td><td>Matthias Schmidt</td><td>0175-7216437</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Konfiguration [cite: 45, 46]
    const BASEROW_API_TOKEN = "SvWXJIjz6eyKd1Z7REyRpCtnuCqJYPrQ"; 
    const BASEROW_SERVER_URL = "https://api.baserow.io";
    const EINTRAEGE_TABLE_ID = 991494;
    const KONFIG_TABLE_ID    = 991493;

    let aktuellerTag = 'Aufbau'; [cite: 47]
    let isLoadingData = false;

    const daten = { "Aufbau": {}, "Freitag": {}, "Samstag": {}, "Sonntag": {}, "Abbau": {} }; [cite: 48]
    const config = { 
      "Aufbau": { aufgaben: [], zeiten: [], farben: [], limits: {} }, 
      "Freitag": { aufgaben: [], zeiten: [], farben: [], limits: {} }, 
      "Samstag": { aufgaben: [], zeiten: [], farben: [], limits: {} }, 
      "Sonntag": { aufgaben: [], zeiten: [], farben: [], limits: {} }, 
      "Abbau": { aufgaben: [], zeiten: [], farben: [], limits: {} }
    }; [cite: 49]

    async function fetchBaserow(method, url, body = null) {
      const headers = { 'Authorization': `Token ${BASEROW_API_TOKEN}`, 'Content-Type': 'application/json' }; [cite: 50]
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body); [cite: 51]
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`API Fehler: ${response.status}`); [cite: 52]
      return response.status === 204 ? {success:true} : await response.json(); [cite: 53, 54]
    }

    async function ladeDaten() {
      if (isLoadingData) return; [cite: 55]
      isLoadingData = true;
      try {
        let allRows = [];
        let nextUrl = `${BASEROW_SERVER_URL}/api/database/rows/table/${EINTRAEGE_TABLE_ID}/?user_field_names=true&size=100`; [cite: 58]
        
        while(nextUrl) {
          const pageData = await fetchBaserow('GET', nextUrl); [cite: 58]
          allRows = allRows.concat(pageData.results); [cite: 59]
          nextUrl = pageData.next ? pageData.next.replace('http://', 'https://') : null; [cite: 60]
        }

        for (const t in daten) daten[t] = {}; [cite: 64]
        for (const row of allRows) {
          if (!row.Tag || !row.Zeit || !row.Aufgabe || !row.Name) continue; [cite: 64]
          const t = String(row.Tag).trim(); [cite: 65]
          const key = `${String(row.Zeit).trim()}||${String(row.Aufgabe).trim()}`; [cite: 66]
          if (daten[t]) {
            if (!daten[t][key]) daten[t][key] = []; [cite: 66]
            daten[t][key].push(String(row.Name).trim()); [cite: 66]
          }
        }
        await ladeKonfiguration(); [cite: 67]
        zeigeTag(aktuellerTag); [cite: 67]
      } catch (e) {
        console.error("Ladefehler Daten:", e); [cite: 68]
      } finally {
        isLoadingData = false; [cite: 69]
      }
    }

    async function ladeKonfiguration() {
      const url = `${BASEROW_SERVER_URL}/api/database/rows/table/${KONFIG_TABLE_ID}/?user_field_names=true`; [cite: 70]
      try {
        const data = await fetchBaserow('GET', url); [cite: 72]
        data.results.forEach(row => {
          const tagName = String(row.Tag).trim(); [cite: 73]
          if (tagName && row.Konfig && config[tagName]) {
            try {
              config[tagName] = JSON.parse(row.Konfig); [cite: 73]
            } catch (jsonErr) {
              console.error("JSON Syntaxfehler in Baserow Zelle:", tagName, jsonErr);
            }
          }
        });
      } catch (e) { 
        console.error("Fehler beim Abruf der Konfiguration:", e); [cite: 75]
      }
    }

    function zeigeTag(t) {
      aktuellerTag = t; [cite: 81]
      const conf = config[t]; [cite: 81]
      const container = document.getElementById('schichtplan'); [cite: 82]
      
      if (!conf || !conf.aufgaben || conf.aufgaben.length === 0) {
        container.innerHTML = `<h2>${t}</h2><p style="text-align:center;">Für diesen Tag wurden noch keine Aufgaben hinterlegt.</p>`; [cite: 82]
        return;
      }

      let html = `<h2>${t}</h2><div class="scroll-container"><table><thead><tr><th>Aufgabe</th>`; [cite: 83, 84]
      conf.zeiten.forEach(z => html += `<th>${z}</th>`); [cite: 84]
      html += `</tr></thead><tbody>`; [cite: 84]

      conf.aufgaben.forEach((a, idx) => {
        const bg = (conf.farben && conf.farben[idx]) ? conf.farben[idx] : '#eee'; [cite: 85]
        html += `<tr><th style="background:${bg}">${a}</th>`; [cite: 85]
        conf.zeiten.forEach(z => {
          const key = `${z}||${a}`; [cite: 86]
          const helfer = daten[t][key] || []; [cite: 86]
          const max = (conf.limits && conf.limits[key]) ? conf.limits[key] : 3; [cite: 86]
          const istVoll = helfer.length >= max; [cite: 89]

          html += `<td><strong>${helfer.length}/${max}</strong><ul class="helfer-list">`; [cite: 90]
          helfer.forEach(n => html += `<li>${n}</li>`); [cite: 90]
          html += `</ul>`;
          
          if (istVoll) {
            html += `<div class="schicht-voll">✔️ Voll</div>`; [cite: 89]
          } else {
            html += `<div class="input-gruppe">
              <input id="name-${key}" placeholder="Name">
              <button onclick="eintragen('${key}')">✔️</button>
            </div>`; [cite: 87, 88]
          }
          html += `</td>`;
        });
        html += `</tr>`;
      });

      html += `</tbody></table></div>`;
      container.innerHTML = html;
    }

    async function eintragen(key) {
      const input = document.getElementById('name-' + key); [cite: 91]
      const name = input.value.trim(); [cite: 91]
      if (!name) return; [cite: 92]
      const [zeit, aufgabe] = key.split('||'); [cite: 92]
      
      try {
        await fetchBaserow('POST', `${BASEROW_SERVER_URL}/api/database/rows/table/${EINTRAEGE_TABLE_ID}/?user_field_names=true`, {
          "Tag": aktuellerTag, "Zeit": zeit, "Aufgabe": aufgabe, "Name": name
        }); [cite: 94, 95]
        input.value = ""; [cite: 95]
        await ladeDaten(); [cite: 95]
      } catch (e) { 
        alert("Speichern fehlgeschlagen!"); [cite: 96] 
      }
    }

    function zeigeVerantwortliche() { document.getElementById('verantwortlicheBox').style.display = 'block'; } [cite: 79]
    function verantwortlicheSchliessen() { document.getElementById('verantwortlicheBox').style.display = 'none'; } [cite: 80]

    // Initialer Start
    ladeDaten();
  </script>
</body>
</html>
