<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helferplan Festspiele vom Nordring Pt. 2</title>
  <style>
    html, body { height:100%; margin:0; padding:0; }
    body { font-family: Arial, sans-serif; padding: 16px; background: #f9f9f9; min-height:100vh;}
    h1, h2 { text-align: center; }
    .tage-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    button { padding: 12px 14px; background: #007bff; color: white; border: none; border-radius: 7px; cursor: pointer; font-size:1.07em; }
    button:hover { background: #0056b3; }
    .btn-purple { background: #6f42c1; }
    /* Optimierung für Mobil & PC */
    #schichtplan { margin-bottom:18px; overflow-x: auto; background: white; padding: 10px; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; background: white; min-width:500px;}
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; vertical-align: top; }
    th { background-color: #eee; }
    .helfer-list { list-style: none; margin: 0; padding: 0; text-align: left; font-size: 0.9em; }
    .input-gruppe { display: flex; margin-top: 5px; flex-direction: column; gap: 5px; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; font-size: 16px; }
    .input-gruppe button { border-radius: 5px; padding: 8px; }
    .schicht-voll { margin-top: 10px; padding: 8px; font-weight: bold; color: #28a745; background-color: #eaf6ec; border: 1px solid #a3d9b1; border-radius: 5px; }
    #verantwortlicheBox { display:none; position:fixed; z-index:999; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5);}
    #verantwortlicheInhalt { background:#fff; max-width:90vw; margin:10vh auto; padding:20px; border-radius:10px; position:relative; }
  </style>
</head>
<body>

<h1>Helferplan Festspiele vom Nordring Pt. 2</h1>

<div class="tage-buttons">
  <button onclick="zeigeTag('Aufbau')">Aufbau 11.06.</button>
  <button onclick="zeigeTag('Freitag')">Fr 12.06.</button>
  <button onclick="zeigeTag('Samstag')">Sa 13.06.</button>
  <button onclick="zeigeTag('Sonntag')">So 14.06.</button>
  <button onclick="zeigeTag('Abbau')">Abbau 15.06.</button>
  <button class="btn-purple" onclick="zeigeVerantwortliche()">Verantwortliche</button>
</div>

<div id="schichtplan"></div>

<div id="verantwortlicheBox" onclick="if(event.target===this)this.style.display='none'">
  <div id="verantwortlicheInhalt">
    <button onclick="document.getElementById('verantwortlicheBox').style.display='none'" style="position:absolute;right:10px;top:10px;background:red; border:none; color:white; cursor:pointer;">X</button>
    <h2>Schichtverantwortliche</h2>
    <p>Ausschank: Nico Fischer (0163-9079261)</p>
    <p>Küche: Iris Dörfler (0170-4071272)</p>
  </div>
</div>

<script>
  const BASEROW_TOKEN = "SvWXJIjz6eyKd1Z7REyRpCtnuCqJYPrQ";
  const ID_EINTRAEGE = 991494;
  const ID_KONFIG = 991493;

  let aktuellerTag = 'Aufbau';
  let daten = { "Aufbau": {}, "Freitag": {}, "Samstag": {}, "Sonntag": {}, "Abbau": {} };
  let config = {};

  async function api(method, url, body = null) {
    const opt = { method, headers: { 'Authorization': 'Token ' + BASEROW_TOKEN, 'Content-Type': 'application/json' } };
    if (body) opt.body = JSON.stringify(body);
    const res = await fetch(url, opt);
    return res.status === 204 ? {} : res.json();
  }

  async function ladeAlles() {
    try {
      const rows = await api('GET', 'https://api.baserow.io/api/database/rows/table/' + ID_EINTRAEGE + '/?user_field_names=true');
      const konf = await api('GET', 'https://api.baserow.io/api/database/rows/table/' + ID_KONFIG + '/?user_field_names=true');
      konf.results.forEach(r => { const t = String(r.Tag).trim(); try { config[t] = JSON.parse(r.Konfig); } catch(e) {} });
      Object.keys(daten).forEach(key => daten[key] = {});
      rows.results.forEach(r => {
        const t = String(r.Tag).trim();
        const k = r.Zeit + "||" + r.Aufgabe;
        if(daten[t]) { if(!daten[t][k]) daten[t][k] = []; daten[t][k].push(r.Name); }
      });
      zeigeTag(aktuellerTag);
    } catch(e) { console.error("Fehler:", e); }
  }

  function zeigeTag(t) {
    aktuellerTag = t;
    const c = config[t];
    const cont = document.getElementById('schichtplan');
    if(!c || !c.aufgaben) { cont.innerHTML = "<h2>" + t + "</h2><p>Keine Daten für '" + t + "' gefunden.</p>"; return; }
    
    let h = "<h2>" + t + "</h2><table><thead><tr><th>Aufgabe</th>";
    c.zeiten.forEach(z => h += "<th>" + z + "</th>");
    h += "</tr></thead><tbody>";
    c.aufgaben.forEach((a, i) => {
      h += "<tr><th style='background:" + (c.farben[i] || '#eee') + "'>" + a + "</th>";
      c.zeiten.forEach(z => {
        const k = z + "||" + a;
        const leute = daten[t][k] || [];
        const m = c.limits[k] || 3;
        h += "<td><strong>" + leute.length + "/" + m + "</strong><ul class='helfer-list'>";
        leute.forEach(n => h += "<li>" + n + "</li>");
        h += "</ul>";
        if(leute.length >= m) { h += "<div class='schicht-voll'>VOLL</div>"; } 
        else { h += "<div class='input-gruppe'><input id='in-" + k + "' placeholder='Name' onkeypress='if(event.key===\"Enter\")eintragen(\""+k+"\")'><button onclick=\"eintragen('"+k+"')\">Eintragen</button></div>"; }
        h += "</td>";
      });
      h += "</tr>";
    });
    cont.innerHTML = h + "</tbody></table>";
  }

  async function eintragen(k) {
    const n = document.getElementById('in-' + k).value.trim();
    if(!n) return;
    const [z, a] = k.split('||');
    await api('POST', 'https://api.baserow.io/api/database/rows/table/' + ID_EINTRAEGE + '/?user_field_names=true', { "Tag": aktuellerTag, "Zeit": z, "Aufgabe": a, "Name": n });
    ladeAlles();
  }

  function zeigeVerantwortliche() { document.getElementById('verantwortlicheBox').style.display='block'; }
  ladeAlles();
</script>
</body>
</html>
