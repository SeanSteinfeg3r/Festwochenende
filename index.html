<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helferplan Festspiele vom Nordring</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 10px; background: #f4f4f9; margin: 0; }
    h1 { font-size: 1.2em; text-align: center; }
    .tage-buttons { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; }
    button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; flex: 1 1 45%; }
    .btn-purple { background: #6f42c1; }
    #schichtplan { overflow-x: auto; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    th { background-color: #eee; }
    .input-gruppe { display: flex; flex-direction: column; gap: 5px; }
    input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; width: 100%; box-sizing: border-box; }
    .input-gruppe button { padding: 12px; background: #28a745; }
    .schicht-voll { color: #28a745; font-weight: bold; padding: 8px; }
    .helfer-list { text-align: left; padding-left: 20px; margin: 5px 0; }
  </style>
</head>
<body>

  <h1>Helferplan Nordring</h1>
  <div class="tage-buttons">
    <button onclick="zeigeTag('Aufbau')">Aufbau</button>
    <button onclick="zeigeTag('Freitag')">Freitag</button>
    <button onclick="zeigeTag('Samstag')">Samstag</button>
    <button onclick="zeigeTag('Sonntag')">Sonntag</button>
    <button onclick="zeigeTag('Abbau')">Abbau</button>
  </div>

  <div id="schichtplan"></div>

  <script>
    const BASEROW_TOKEN = "SvWXJIjz6eyKd1Z7REyRpCtnuCqJYPrQ";
    const ID_EINTRAEGE = 991494;
    const ID_KONFIG = 991493;

    let aktuellerTag = 'Aufbau';
    let daten = { "Aufbau": {}, "Freitag": {}, "Samstag": {}, "Sonntag": {}, "Abbau": {} };
    let config = {};

    async function api(method, url, body = null) {
      const opt = { method, headers: { 'Authorization': 'Token ' + BASEROW_TOKEN, 'Content-Type': 'application/json' } };
      if (body) opt.body = JSON.stringify(body);
      const res = await fetch(url, opt);
      return res.status === 204 ? {} : res.json();
    }

    async function ladeAlles() {
      try {
        const rows = await api('GET', 'https://api.baserow.io/api/database/rows/table/' + ID_EINTRAEGE + '/?user_field_names=true');
        const konf = await api('GET', 'https://api.baserow.io/api/database/rows/table/' + ID_KONFIG + '/?user_field_names=true');
        
        konf.results.forEach(r => { config[String(r.Tag).trim()] = JSON.parse(r.Konfig); });

        Object.keys(daten).forEach(key => daten[key] = {});
        rows.results.forEach(r => {
          const t = String(r.Tag).trim();
          const k = r.Zeit + "||" + r.Aufgabe;
          if(daten[t]) {
            if(!daten[t][k]) daten[t][k] = [];
            daten[t][k].push(r.Name);
          }
        });
        zeigeTag(aktuellerTag);
      } catch(e) { console.error(e); }
    }

    function zeigeTag(t) {
      aktuellerTag = t;
      const c = config[t];
      const cont = document.getElementById('schichtplan');
      if(!c) { cont.innerHTML = "<p>Keine Konfig für " + t + "</p>"; return; }

      let h = "<h2>" + t + "</h2><table><tr><th>Aufgabe</th>";
      c.zeiten.forEach(z => h += "<th>" + z + "</th>");
      h += "</tr>";

      c.aufgaben.forEach((a, i) => {
        h += "<tr><th style='background:" + (c.farben[i] || '#eee') + "'>" + a + "</th>";
        c.zeiten.forEach(z => {
          const k = z + "||" + a;
          const leute = daten[t][k] || [];
          const m = c.limits[k] || 3;
          h += "<td><strong>" + leute.length + "/" + m + "</strong><ul class='helfer-list'>";
          leute.forEach(n => h += "<li>" + n + "</li>");
          h += "</ul>";
          if(leute.length >= m) {
            h += "<div class='schicht-voll'>VOLL</div>";
          } else {
            h += "<div class='input-gruppe'><input id='in-" + k + "' placeholder='Dein Name' onkeypress='handleEnter(event, \"" + k + "\")'><button onclick=\"eintragen('" + k + "')\">Eintragen</button></div>";
          }
          h += "</td>";
        });
        h += "</tr>";
      });
      cont.innerHTML = h + "</table>";
    }

    function handleEnter(e, k) { if (e.key === 'Enter') eintragen(k); }

    async function eintragen(k) {
      const n = document.getElementById('in-' + k).value.trim();
      if(!n) return;
      const [z, a] = k.split('||');
      await api('POST', 'https://api.baserow.io/api/database/rows/table/' + ID_EINTRAEGE + '/?user_field_names=true', {
        "Tag": aktuellerTag, "Zeit": z, "Aufgabe": a, "Name": n
      });
      ladeAlles();
    }

    ladeAlles();
  </script>
</body>
</html>
